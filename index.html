<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Happy Birthday Salah!</title>
        <style>
        :root {
            --bg-color: #f7f5f0;
            --primary-color: #6f4e37;
            --secondary-color: #b09374;
            --accent-color: #d4a373;
            --text-dark: #3e2723;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Audio Control Bar */
        .audio-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--secondary-color);
        }

        .audio-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .audio-btn:hover {
            background: var(--accent-color);
        }

        /* Hero Section */
        header {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            position: relative;
            background: linear-gradient(180deg, #e6dfd3 0%, var(--bg-color) 100%);
        }

        .hero-title {
            font-size: 3.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .wishes-text {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-dark);
            max-width: 800px;
            direction: ltr;
            margin: 20px auto;
            padding: 15px;
            border-bottom: 3px solid var(--accent-color);
            display: inline-block;
        }

        /* Main Gallery Grid */
        .gallery-container {
            max-width: 1200px;
            margin: 0 auto 60px auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 40px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--accent-color);
            margin: 10px auto 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(176, 147, 116, 0.2);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(111, 78, 55, 0.15);
        }

        .image-box {
            position: relative;
            width: 100%;
            padding-top: 120px; /* Base structural height */
            background-color: #eaeaea;
            overflow: hidden;
        }

        /* Using placeholder image services styled to map directly to your image uploads */
        .image-box img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .image-box img {
            transform: scale(1.03);
        }

        .card-content {
            padding: 20px;
            text-align: center;
            background: var(--card-bg);
            font-weight: 500;
            color: var(--primary-color);
        }

        /* Confetti Effect */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: var(--accent-color);
            position: absolute;
            animation: fall linear forwards;
            opacity: 0.8;
            z-index: 1;
        }

        @keyframes fall {
            to {
                transform: translateY(80vh) rotate(360deg);
            }
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            background-color: #e6dfd3;
            color: var(--primary-color);
            font-weight: bold;
            margin-top: 40px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .wishes-text { font-size: 1.3rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
    </head>
    <body>

        <div class="audio-container">
            <span>🎵 Salah AbdelFatah</span>
            <audio id="bg-music" loop autoplay>
                <source
                    src="assets/music.mp3"
                    type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <button class="audio-btn" id="music-toggle"
                onclick="toggleMusic()">Pause</button>
        </div>

        <header id="celebration-header">
            <h1 class="hero-title">Happy Birthday, Salah! 🎉</h1>
            <div class="wishes-text">
                "Kol sana wenta tyb ya salah abdelfatah, w 3o2bal 1000034897 sana"
            </div>
        </header>

        <main class="gallery-container">
            <h2 class="section-title">Salah's Moments</h2>
            <div class="grid">

                <div class="card">
                    <div class="image-box" style="padding-top: 150%;">
                        <img src="assets/gym.jpeg"
                            alt="Salah at Gym">
                    </div>
                    <div class="card-content">المنش 💪</div>
                </div>

                <div class="card">
                    <div class="image-box" style="padding-top: 140%;">
                        <img src="assets/choke anas.jpeg"
                            alt="Salah and Friends Studying">
                    </div>
                    <div class="card-content">Edelo
                        📚</div>
                </div>

                <div class="card">
                    <div class="image-box" style="padding-top: 100%;">
                        <img src="assets/sandwich.jpeg"
                            alt="Salah with Food">
                    </div>
                    <div class="card-content">🌯</div>
                </div>

                <div class="card">
                    <div class="image-box" style="padding-top: 150%;">
                        <img src="assets/suit.jpeg"
                            alt="Salah Formal Look">
                    </div>
                    <div class="card-content">👔</div>
                </div>

                <div class="card">
                    <div class="image-box" style="padding-top: 130%;">
                        <img src="assets/chef.jpeg"
                            alt="Salah Cooking">
                    </div>
                    <div class="card-content">Chef Salah 🍳</div>
                </div>

                <div class="card">
                    <div class="image-box" style="padding-top: 130%;">
                        <img src="assets/home.jpeg"
                            alt="Group Mirror Selfie">
                    </div>
                    <div class="card-content">Brothers 🤝</div>
                </div>

                <div class="card">
                    <div class="image-box" style="padding-top: 150%;">
                        <img src="assets/salah.jpeg"
                            alt="Salah Portrait">
                    </div>
                    <div class="card-content">Classic Look ✨</div>
                </div>

                <div class="card">
                    <div class="image-box" style="padding-top: 150%;">
                        <img src="assets/sick.jpeg"
                            alt="Salah Recovery">
                    </div>
                    <div class="card-content">yl3an 2om el mrara ya gada3 ana
                        zha2t</div>
                </div>

            </div>
        </main>

        <footer>
            <p>Made for Salah Abdelfatah — Cheers to 1000034897 More Years!</p>
        </footer>

        <script>
        // Background Music Control Logic
        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.getElementById('music-toggle');
            if (music.paused) {
                music.play().catch(err => console.log("Audio playback configuration required: ", err));
                btn.textContent = 'Pause';
            } else {
                music.pause();
                btn.textContent = 'Play';
            }
        }

        // Floating Confetti Initialization Logic
        function createConfetti() {
            const header = document.getElementById('celebration-header');
            const colors = ['#6f4e37', '#b09374', '#d4a373', '#e6dfd3'];
            
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = Math.random() * 20 + 'vh';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            confetti.style.animationDelay = Math.random() * 2 + 's';
            header.appendChild(confetti);
        }
        
        // Start continuous confetti generation
        function startConfetti() {
            createConfetti();
            setInterval(createConfetti, 300);
        }
        
        // Run decoration on load
        window.addEventListener('DOMContentLoaded', function() {
            startConfetti();
            // Attempt to autoplay music on load
            const music = document.getElementById('bg-music');
            const btn = document.getElementById('music-toggle');
            music.play().catch(err => {
                console.log("Autoplay prevented by browser policy. User can click Play button.");
                btn.textContent = 'Play';
            });
        });
    </script>
    </body>
</html>
